<section class="contact-form">
    <h2 class="contact-form__title">
        Diligencia los campos y contactanos
    </h2>

    <form class="contact-form__form">
        <div class="contact-form__row">
        <label for="" class="contact-form__label">
                Nombre
        <input type="text" class="contact-form__input" 
        placeholder="Ingrese su nombre" required></label>
        
        <label for="" class="contact-form__label">
                Telefono
        <input type="tel" class="contact-form__input" 
        placeholder="Ingrese su número de telefono" required></label>
        </div>

        <label for="" class="contact-form__label">
                correo
        <input type="email" class="contact-form__input" 
        placeholder="Ingrese su correo electronico" required></label>

        <label for="" class="contact-form__label">
                Mensaje
        <textarea name="" id="" class="contact-form__text-area" placeholder="Ingrese su mensaje aquí..." required>
        </textarea>
            </label>
            
            <div class="contact-form__actions">
            <button type="submit" class="contact-form__button">Cancelar</button>
            <button type="submit" class="contact-form__button
            contact-form__button--green">Enviar</button>
            </div> 
        </form>
</section>
